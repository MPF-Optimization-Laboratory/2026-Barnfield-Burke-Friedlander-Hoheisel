name: ci

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run smoke tests
        run: uv run pytest -q

  reproduce-fig-7-1:
    name: Regenerate Figure 7.1
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install system LaTeX (for matplotlib's usetex)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-recommended \
            texlive-fonts-recommended dvipng cm-super

      - name: Install dependencies
        run: uv sync

      - name: Regenerate Figure 7.1
        run: uv run python scripts/fig_7_1_problem_data.py

      - name: Upload figure artifact
        uses: actions/upload-artifact@v4
        with:
          name: figure-7-1
          path: figures/problem_data.pdf
          if-no-files-found: error
